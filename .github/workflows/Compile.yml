name: Compile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  react-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: '14'
          cache: npm
          cache-dependency-path: facade-app/package-lock.json

      - name: Build and test React app
        working-directory: facade-app
        run: |
          npm ci
          npm run build
          npm run test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./facade-app

  lua-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Lua + LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks

      - name: Install Lua validator/test tools
        run: |
          luarocks install --local luacheck

      - name: Validate Lua scripts (lint)
        working-directory: lua-modules
        run: |
          export PATH="$HOME/.luarocks/bin:$PATH"
          luacheck .