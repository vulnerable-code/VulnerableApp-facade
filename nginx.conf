worker_processes 1;

error_log logs/error.log info;

events {
    worker_connections 512;
}

http {
    include mime.types;
    sendfile on;
    server {
        client_max_body_size 0;
        location /VulnerableApp {
        	# As VulnerableApp-Facade should run even if some of the Vulnerable Applications are not present
        	# there for added below configuration.
        	# https://stackoverflow.com/questions/32845674/setup-nginx-not-to-crash-if-host-in-upstream-is-not-found
        	resolver 127.0.0.11;
        	set $VulnerableApplication VulnerableApp-base;
            proxy_pass http://$VulnerableApplication:9090; 
        }
        
        location /VulnerableApp-jsp {
		    # As VulnerableApp-Facade should run even if some of the Vulnerable Applications are not present
        	# there for added below configuration.
        	# https://stackoverflow.com/questions/32845674/setup-nginx-not-to-crash-if-host-in-upstream-is-not-found        	
        	resolver 127.0.0.11;
        	set $VulnerableApplication VulnerableApp-jsp;
  	        proxy_pass http://$VulnerableApplication:8080;
        }

	location /VulnerableApp-php {
		    # As VulnerableApp-Facade should run even if some of the Vulnerable Applications are not present
        	# there for added below configuration.
        	# https://stackoverflow.com/questions/32845674/setup-nginx-not-to-crash-if-host-in-upstream-is-not-found        	
        	resolver 127.0.0.11;
        	set $VulnerableApplication VulnerableApp-php;
  		    proxy_pass http://$VulnerableApplication:80;
        }

	location /llmforge {
		# As VulnerableApp-Facade should run even if some of the Vulnerable Applications are not present
		# there for added below configuration.
		# https://stackoverflow.com/questions/32845674/setup-nginx-not-to-crash-if-host-in-upstream-is-not-found
		resolver 127.0.0.11;
		set $VulnerableApplication llmforge;
		proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
		proxy_pass http://$VulnerableApplication:8000;
	}
        
        location = /VulnerabilityDefinitions {
        	default_type 'application/json';
        	content_by_lua_block {
			local vulnerableAppResponse, vulnerableAppJspResponse, vulnerableAppPhpResponse, llmForgeResponse = ngx.location.capture_multi({
				{ "/VulnerableApp/VulnerabilityDefinitions" },
				{ "/VulnerableApp-jsp/VulnerabilityDefinitions" },
				{ "/VulnerableApp-php/VulnerabilityDefinitions" },
				{ "/llmforge/VulnerabilityDefinitions" }
			})
			ngx.say(require("vulnerableapp_utility").merge_vulnerability_information(vulnerableAppResponse, vulnerableAppJspResponse, vulnerableAppPhpResponse, llmForgeResponse))
    		}
	}

	location = /scanner/dast {
        	default_type 'application/json';
        	content_by_lua_block {
			local vulnerableAppResponse, vulnerableAppJspResponse, vulnerableAppPhpResponse = ngx.location.capture_multi({
				{ "/VulnerableApp/scanner" },
				{ "/VulnerableApp-jsp/scanner/dast" },
				{ "/VulnerableApp-php/scanner/dast" }
			})
			ngx.say(require("vulnerableapp_utility").merge_vulnerability_information(vulnerableAppResponse, vulnerableAppJspResponse, vulnerableAppPhpResponse))
    		}
        }

	location = /scanner/sast {
        	default_type 'application/json';
        	content_by_lua_block {
			local vulnerableAppResponse, vulnerableAppJspResponse, vulnerableAppPhpResponse = ngx.location.capture_multi({
				{ "/VulnerableApp/scanner/sast" },
				{ "/VulnerableApp-jsp/scanner/sast" },
				{ "/VulnerableApp-php/scanner/sast" }
			})
			ngx.say(require("vulnerableapp_utility").merge_vulnerability_information(vulnerableAppResponse, vulnerableAppJspResponse, vulnerableAppPhpResponse))
    		}
        }

        location / {
	       root /usr/share/nginx/html;
	}
    }
    # https://serverfault.com/questions/379675/nginx-reverse-proxy-url-rewrite	
}
